<style>
  :root{
    --bg:#eef1f4; --panel:#ffffff; --ink:#16202c;
    --navy:#1b2a41; --navy-2:#26374f; --muted:#66707d; --line:#dbe0e6;
    --amber:#f2a93b; --amber-ink:#7a4e05;
    --green:#2e7d5b; --green-bg:#e4f3ec;
    --red:#c0392b; --red-bg:#fbeae8; --watch-bg:#fdf3e2;
    --mono:'IBM Plex Mono',monospace; --disp:'Space Grotesk',sans-serif; --body:'Inter',sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased;}
  ::selection{background:var(--amber);color:var(--navy);}

  header.topbar{background:var(--navy);color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;border-bottom:3px solid var(--amber);}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand .mark{width:38px;height:38px;border-radius:8px;background:var(--amber);color:var(--navy);display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-weight:700;font-size:15px;}
  .brand h1{font-family:var(--disp);font-size:18px;margin:0;font-weight:600;}
  .brand p{margin:0;font-size:11px;color:#b9c3d1;letter-spacing:.4px;text-transform:uppercase;}
  .user-chip{display:flex;align-items:center;gap:8px;font-size:12.5px;flex-wrap:wrap;}
  .role-badge{font-family:var(--mono);font-size:10.5px;font-weight:600;padding:2px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.03em;}
  .role-badge.ie{background:#e7edff;color:#35507a;}
  .role-badge.supervisor{background:#eaf3ea;color:#4b7f52;}
  .role-badge.tamu{background:#f1efe8;color:#8a8776;}
  .line-badge{font-family:var(--mono);font-size:10.5px;font-weight:600;padding:2px 9px;border-radius:999px;background:#26374f;color:#fff;}
  #logoutBtn{background:none;border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;color:#fff;}
  #logoutBtn:hover{background:rgba(255,255,255,.1);}

  main{max-width:1100px;margin:0 auto;padding:20px;}
  .panel{background:var(--panel);border-radius:10px;padding:20px;box-shadow:0 1px 3px rgba(20,30,45,.06);margin-bottom:18px;}
  .panel h2{font-family:var(--disp);font-size:17px;margin:0 0 4px;}
  .panel h3{font-family:var(--disp);font-size:14px;margin:0 0 12px;color:var(--navy);}
  .sub{color:var(--muted);font-size:12.5px;margin:0 0 16px;}

  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:18px;}
  .kpi{border:1px solid var(--line);border-radius:8px;padding:12px 14px;background:#fbfcfd;}
  .kpi .lbl{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-family:var(--mono);}
  .kpi .val{font-family:var(--disp);font-size:23px;font-weight:700;margin-top:4px;color:var(--navy);}
  .kpi .val small{font-size:12px;font-weight:500;color:var(--muted);}

  .andon{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;}
  .andon .cell{border:1px solid var(--line);border-left:5px solid #c7ced6;border-radius:8px;padding:10px 12px;background:#fff;}
  .andon .cell.ok{border-left-color:var(--green);}
  .andon .cell.watch{border-left-color:var(--amber);}
  .andon .cell.risk{border-left-color:var(--red);}
  .andon .cell.empty{opacity:.5;}
  .andon .cell .ln{font-family:var(--mono);font-weight:700;font-size:13px;}
  .andon .cell .metric{font-size:11px;color:var(--muted);margin-top:4px;}
  .andon .cell .metric b{color:var(--ink);font-family:var(--mono);}

  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
  .field label{font-size:11px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
  .field input,.field select,.field textarea{padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:var(--body);background:#fff;}
  .field-row{display:flex;gap:12px;flex-wrap:wrap;}
  .field-row .field{flex:1;min-width:140px;}

  .btn{border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--body);}
  .btn.primary{background:var(--navy);color:#fff;}
  .btn.primary:hover{background:var(--navy-2);}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink);}
  .btn.danger{background:var(--red-bg);color:var(--red);}
  .btn.sm{padding:5px 10px;font-size:12px;}
  .btn:disabled{opacity:.6;cursor:default;}

  .tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:8px;}
  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  th,td{padding:9px 10px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap;}
  th{background:#f4f6f8;font-family:var(--mono);font-size:10.5px;text-transform:uppercase;color:var(--muted);letter-spacing:.4px;}
  tr:last-child td{border-bottom:none;}
  td.num{font-family:var(--mono);text-align:right;}

  .subnav{display:flex;gap:2px;margin-bottom:16px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
  .subnav button{background:none;border:none;padding:10px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;font-family:var(--body);}
  .subnav button.active{color:var(--navy);border-bottom-color:var(--amber);}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:11px 20px;border-radius:8px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:2000;max-width:90vw;text-align:center;}
  .toast.show{opacity:1;}

  .chart-box{border:1px solid var(--line);border-radius:8px;padding:14px;margin-top:16px;}

  #loginScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
  #loginScreen .box{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:28px 24px;width:100%;max-width:340px;box-shadow:0 8px 24px rgba(0,0,0,.08);}
  #loginScreen h2{margin:0 0 4px;font-size:19px;font-family:var(--disp);}
  #loginScreen p.sub{margin:0 0 18px;}
  #loginScreen .btn{width:100%;}
  #loginError{color:#b4432e;font-size:12.5px;margin:-6px 0 12px;min-height:1em;}
  #fatalError{display:none;background:#fdecea;color:#b4432e;font-size:12px;padding:10px 12px;border-radius:8px;margin-bottom:14px;word-break:break-word;}
  #appRoot{display:none;}
  .hidden{display:none !important;}
</style>

<div class="toast" id="toast"></div>

<script>
const LINES = ['1A','1B','2','3','4','5','8','9A','9B','11A','11B','12A','12B','13A','13B','14'];
const SLOTS = ['08:00-11:00','11:00-14:00','14:00-17:00','17:00-20:00','20:00-23:00','23:00-02:00','02:00-05:00','05:00-08:00'];
const API_BASE = '/api';

// ---------- utility ----------
function todayStr(){ return new Date().toISOString().slice(0,10); }
function fmtNum(n,dec=0){ if(n===null||n===undefined||isNaN(n)) return '-'; return Number(n).toLocaleString('id-ID',{minimumFractionDigits:dec,maximumFractionDigits:dec}); }
function fmtDate(d){ if(!d) return '-'; return new Date(d+'T00:00:00').toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}); }
function statusClass(eff){ if(eff===null) return 'empty'; if(eff>=100) return 'ok'; if(eff>=85) return 'watch'; return 'risk'; }
let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 3200);
}

// ---------- Auth & role state ----------
let sbClient;
try {
  sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
} catch (e) {
  const box = document.getElementById('fatalError');
  box.style.display = 'block';
  box.textContent = 'Gagal membuat koneksi Supabase: ' + e.message + '. Cek ulang SUPABASE_URL & SUPABASE_ANON_KEY di index.html.';
}
let currentUser = null; // { id, email, fullName, role, line }

async function authHeader(){
  const { data:{ session } } = await sbClient.auth.getSession();
  if(!session) return {};
  return { 'Authorization': 'Bearer ' + session.access_token };
}

async function apiGet(path){
  const res = await fetch(API_BASE + path, { headers: await authHeader() });
  if(!res.ok){ const b = await res.json().catch(()=>({})); throw new Error(b.error || ('HTTP '+res.status)); }
  return res.json();
}
async function apiPost(path, body){
  const res = await fetch(API_BASE + path, {
    method: 'POST',
    headers: Object.assign({'Content-Type':'application/json'}, await authHeader()),
    body: JSON.stringify(body)
  });
  if(!res.ok){ const b = await res.json().catch(()=>({})); throw new Error(b.error || ('HTTP '+res.status)); }
  return res.json();
}
async function apiPatch(path, body){
  const res = await fetch(API_BASE + path, {
    method: 'PATCH',
    headers: Object.assign({'Content-Type':'application/json'}, await authHeader()),
    body: JSON.stringify(body)
  });
  if(!res.ok){ const b = await res.json().catch(()=>({})); throw new Error(b.error || ('HTTP '+res.status)); }
  return res.json();
}
async function apiDelete(path){
  const res = await fetch(API_BASE + path, { method:'DELETE', headers: await authHeader() });
  if(!res.ok){ const b = await res.json().catch(()=>({})); throw new Error(b.error || ('HTTP '+res.status)); }
  return res.json();
}

document.getElementById('loginForm').addEventListener('submit', async function(ev){
  ev.preventDefault();
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  errEl.textContent = '';
  btn.disabled = true; btn.textContent = 'Memproses...';
  const { error } = await sbClient.auth.signInWithPassword({ email, password });
  btn.disabled = false; btn.textContent = 'Masuk';
  if(error){ errEl.textContent = 'Login gagal: email atau password salah.'; return; }
  await showApp();
});

document.getElementById('logoutBtn').addEventListener('click', async ()=>{
  await sbClient.auth.signOut();
  showLogin();
});

function showLogin(){
  document.getElementById('appRoot').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

async function loadCurrentUser(){
  const headers = await authHeader();
  const res = await fetch(API_BASE + '/me', { headers });
  if(!res.ok) throw new Error('Gagal memuat profil user.');
  return res.json();
}

async function showApp(){
  try{
    currentUser = await loadCurrentUser();
  }catch(err){
    showToast('Gagal memuat profil: ' + err.message);
    await sbClient.auth.signOut();
    showLogin();
    return;
  }
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appRoot').style.display = 'block';
  document.getElementById('userName').textContent = currentUser.fullName || currentUser.email;
  document.getElementById('userRoleBadge').textContent = currentUser.role;
  document.getElementById('userRoleBadge').className = 'role-badge ' + currentUser.role;
  const lineBadge = document.getElementById('userLineBadge');
  if(currentUser.line){ lineBadge.textContent = 'LINE ' + currentUser.line; lineBadge.classList.remove('hidden'); }
  else { lineBadge.classList.add('hidden'); }

  ['view-tamu','view-supervisor','view-ie'].forEach(id=>document.getElementById(id).classList.add('hidden'));

  if(currentUser.role === 'tamu'){
    document.getElementById('view-tamu').classList.remove('hidden');
    renderTamuView();
  } else if(currentUser.role === 'supervisor'){
    document.getElementById('view-supervisor').classList.remove('hidden');
    renderSupervisorView();
  } else if(currentUser.role === 'ie'){
    document.getElementById('view-ie').classList.remove('hidden');
    initIeView();
  } else {
    showToast('Role tidak dikenali: ' + currentUser.role);
  }
}

async function initAuth(){
  const { data:{ session } } = await sbClient.auth.getSession();
  if(session){ await showApp(); } else { showLogin(); }
}

// ================================================================
// Dashboard helper (dipakai oleh Tamu & sub-tab Dashboard IE)
// ================================================================
async function buildDashboardHtml(date){
  const [configs, qtyLogs, attendances] = await Promise.all([
    apiGet('/line-config?date=' + date),
    apiGet('/qty-logs?date=' + date),
    apiGet('/attendance?date=' + date),
  ]);

  const perLine = {};
  LINES.forEach(l => perLine[l] = { line:l, target:0, output:0, present:0, absent:0, mesin:0, hasConfig:false });

  configs.forEach(c=>{
    if(!perLine[c.line]) perLine[c.line] = { line:c.line, target:0, output:0, present:0, absent:0, mesin:0, hasConfig:false };
    const target = c.target_output > 0 ? c.target_output : (c.smv>0 ? (c.mp*c.wh*60/c.smv) : 0);
    perLine[c.line].target = target;
    perLine[c.line].mesin = Number(c.mesin)||0;
    perLine[c.line].hasConfig = true;
  });
  qtyLogs.forEach(q=>{
    if(!perLine[q.line]) perLine[q.line] = { line:q.line, target:0, output:0, present:0, absent:0, mesin:0, hasConfig:false };
    // qty kini bersifat kumulatif per slot, jadi output harian = nilai kumulatif TERTINGGI, bukan hasil jumlah semua slot.
    const cum = Number(q.qty)||0;
    if(cum > perLine[q.line].output) perLine[q.line].output = cum;
  });
  attendances.forEach(a=>{
    if(!perLine[a.line]) perLine[a.line] = { line:a.line, target:0, output:0, present:0, absent:0, mesin:0, hasConfig:false };
    perLine[a.line].present = Number(a.present_count)||0;
    perLine[a.line].absent = Number(a.absent_count)||0;
  });

  const rows = LINES.map(l=>perLine[l]);
  rows.forEach(r=>{ r.mcShift = r.mesin>0 ? (r.output/r.mesin) : null; });

  const activeRows = rows.filter(r=>r.hasConfig || r.output>0);
  const totalOutput = rows.reduce((s,r)=>s+r.output,0);
  const totalTarget = rows.reduce((s,r)=>s+r.target,0);
  const totalPresent = rows.reduce((s,r)=>s+r.present,0);
  const totalAbsent = rows.reduce((s,r)=>s+r.absent,0);
  const totalMesin = rows.reduce((s,r)=>s+r.mesin,0);
  const avgEff = totalTarget>0 ? Math.round((totalOutput/totalTarget)*100) : null;
  const overallMcShift = totalMesin>0 ? (totalOutput/totalMesin) : null;

  const cells = rows.map(r=>{
    const eff = r.target>0 ? Math.round((r.output/r.target)*100) : null;
    const cls = (r.hasConfig || r.output>0) ? statusClass(eff) : 'empty';
    return `
      <div class="andon cell ${cls}" style="display:block;">
        <div class="ln">LINE ${r.line}</div>
        <div class="metric">Output: <b>${fmtNum(r.output)}</b> / ${fmtNum(r.target)}</div>
        <div class="metric">Efisiensi: <b>${eff===null?'-':eff+'%'}</b></div>
        <div class="metric">Hadir/Absen: <b>${fmtNum(r.present)}/${fmtNum(r.absent)}</b></div>
        <div class="metric">MC Shift: <b>${r.mcShift===null?'-':fmtNum(r.mcShift,1)}</b> ${r.mesin>0?'<span style="color:var(--muted);">('+fmtNum(r.mesin)+' mesin)</span>':''}</div>
      </div>`;
  }).join('');

  const mcRows = activeRows.length ? activeRows : rows.filter(r=>r.hasConfig);
  const mcTableRows = mcRows.map(r=>`
    <tr>
      <td>LINE ${r.line}</td>
      <td class="num">${fmtNum(r.output)}</td>
      <td class="num">${fmtNum(r.mesin)}</td>
      <td class="num">${r.mcShift===null?'-':fmtNum(r.mcShift,1)}</td>
    </tr>`).join('');

  const html = `
    <div class="kpis">
      <div class="kpi"><div class="lbl">Total Output</div><div class="val">${fmtNum(totalOutput)}</div></div>
      <div class="kpi"><div class="lbl">Total Target</div><div class="val">${fmtNum(totalTarget)}</div></div>
      <div class="kpi"><div class="lbl">Rata-rata Efisiensi</div><div class="val">${avgEff===null?'-':avgEff+'%'}</div></div>
      <div class="kpi"><div class="lbl">Hadir / Tidak Hadir</div><div class="val">${fmtNum(totalPresent)} <small>/ ${fmtNum(totalAbsent)}</small></div></div>
      <div class="kpi"><div class="lbl">Total Mesin Digunakan</div><div class="val">${fmtNum(totalMesin)}</div></div>
      <div class="kpi"><div class="lbl">Rata-rata MC Shift</div><div class="val">${overallMcShift===null?'-':fmtNum(overallMcShift,1)}</div></div>
    </div>
    <div class="andon" style="display:grid;">${cells}</div>

    <h3 style="margin-top:20px;">Grafik Efisiensi per Line</h3>
    <div class="chart-box"><canvas id="effChart_${date.replace(/-/g,'')}" height="90"></canvas></div>

    <h3 style="margin-top:20px;">Summary MC Shift per Line</h3>
    <p class="sub" style="margin:-6px 0 12px;">MC Shift = Output ÷ Jumlah Mesin Digunakan (diisi IE di tab Variabel Line).</p>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Line</th><th>Output</th><th>Mesin</th><th>MC Shift</th></tr></thead>
        <tbody>${mcTableRows || '<tr><td colspan="4" style="text-align:center;color:var(--muted);">Belum ada data.</td></tr>'}</tbody>
      </table>
    </div>
    <div class="chart-box"><canvas id="mcChart_${date.replace(/-/g,'')}" height="90"></canvas></div>
  `;
  return { html, rows: mcRows };
}

function renderEffChart(canvasId, rows){
  const ctx = document.getElementById(canvasId);
  if(!ctx || !window.Chart) return;
  const labelled = rows.filter(r=>r.target>0 || r.output>0);
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labelled.map(r=>'Line '+r.line),
      datasets: [{
        label: 'Efisiensi (%)',
        data: labelled.map(r=> r.target>0 ? Math.round((r.output/r.target)*100) : 0),
        backgroundColor: labelled.map(r=>{
          const eff = r.target>0 ? (r.output/r.target)*100 : 0;
          if(eff>=100) return '#2e7d5b';
          if(eff>=85) return '#f2a93b';
          return '#c0392b';
        }),
      }]
    },
    options: { responsive:true, plugins:{ legend:{ display:false } }, scales:{ y:{ beginAtZero:true } } }
  });
}

function renderMcShiftChart(canvasId, rows){
  const ctx = document.getElementById(canvasId);
  if(!ctx || !window.Chart) return;
  const labelled = rows.filter(r=>r.mcShift!==null);
  if(!labelled.length) return;
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labelled.map(r=>'Line '+r.line),
      datasets: [{
        label: 'MC Shift (output/mesin)',
        data: labelled.map(r=> Math.round(r.mcShift*10)/10),
        backgroundColor: '#26374f',
      }]
    },
    options: { responsive:true, plugins:{ legend:{ display:false } }, scales:{ y:{ beginAtZero:true } } }
  });
}

      </form>
      <div class="tbl-wrap" style="margin-top:14px;">
        <table>
          <thead><tr><th>Slot Jam</th><th>Qty Kumulatif</th><th>Produksi Slot</th><th>Update Terakhir</th></tr></thead>

        </table>

    <div class="panel">

          </div>
        </div>
        <button type="submit" class="btn primary">Simpan Absensi</button>
      </form>
    </div>
  `;

  let qtyCache = [];
  function updateQtyHint(){
    const slotIdx = SLOTS.indexOf(document.getElementById('qtySlot').value);
    let prevCum = 0, prevSlot = null;
    for(let i=slotIdx-1;i>=0;i--){
      const found = qtyCache.find(l=>l.slot===SLOTS[i]);
      if(found){ prevCum = Number(found.qty)||0; prevSlot = SLOTS[i]; break; }
    }
    document.getElementById('qtyHint').textContent = prevSlot
      ? `Kumulatif terakhir (${prevSlot}): ${fmtNum(prevCum)} pcs — isi total sampai slot ini, bukan hanya tambahannya.`
      : 'Belum ada input sebelumnya hari ini — isi total produksi sejak awal shift sampai slot ini.';
  }

  async function refreshQtyTable(){
    const body = document.getElementById('qtyLogBody');
    try{
      const logs = await apiGet('/qty-logs?line='+encodeURIComponent(line)+'&date='+date);
      qtyCache = logs;
      updateQtyHint();
      if(!logs.length){
        body.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--muted);">Belum ada input hari ini.</td></tr>';
        return;
      }
      const sorted = logs.slice().sort((a,b)=>SLOTS.indexOf(a.slot)-SLOTS.indexOf(b.slot));
      let prev = 0;
      body.innerHTML = sorted.map(l=>{
        const cum = Number(l.qty)||0;
        const inc = cum - prev;
        prev = cum;
        return `<tr><td>${l.slot}</td><td class="num">${fmtNum(cum)}</td><td class="num">${fmtNum(inc)}</td><td>${new Date(l.updated_at).toLocaleTimeString('id-ID')}</td></tr>`;
      }).join('');
    }catch(err){
      body.innerHTML = '<tr><td colspan="4" style="color:#c0392b;">Gagal memuat: '+err.message+'</td></tr>';
    }
  }

  async function loadAttendance(){
    try{
      const list = await apiGet('/attendance?line='+encodeURIComponent(line)+'&date='+date);
      if(list.length){
        document.getElementById('attPresent').value = list[0].present_count;
        document.getElementById('attAbsent').value = list[0].absent_count;
      }
    }catch(err){ /* diamkan, form tetap kosong */ }
  }

  document.getElementById('qtySlot').addEventListener('change', updateQtyHint);

  document.getElementById('qtyForm').addEventListener('submit', async (ev)=>{
    ev.preventDefault();
    const slot = document.getElementById('qtySlot').value;
    const qty = document.getElementById('qtyValue').value;
    try{
      await apiPost('/qty-logs', { line, date, slot, qty });
      showToast('Qty kumulatif slot '+slot+' tersimpan.');
      document.getElementById('qtyValue').value = '';
      refreshQtyTable();
    }catch(err){ showToast('Gagal simpan: '+err.message); }
  });

  document.getElementById('attForm').addEventListener('submit', async (ev)=>{
    ev.preventDefault();
    const presentCount = document.getElementById('attPresent').value;
    const absentCount = document.getElementById('attAbsent').value;
    try{
      await apiPost('/attendance', { line, date, presentCount, absentCount });
      showToast('Absensi tersimpan.');
    }catch(err){ showToast('Gagal simpan: '+err.message); }
  });

  refreshQtyTable();
  loadAttendance();
}

function initIeView(){
  const nav = document.getElementById('ieSubnav');
  if(!nav.dataset.bound){
    nav.dataset.bound = '1';
    nav.addEventListener('click', (e)=>{
      if(e.target.tagName !== 'BUTTON') return;
      const sub = e.target.dataset.sub;
      document.querySelectorAll('#ieSubnav button').forEach(b=>b.classList.toggle('active', b===e.target));
      ['dashboard','lineconfig','data','users'].forEach(s=>{
        document.getElementById('ie-'+s).classList.toggle('hidden', s!==sub);
      });
      if(sub==='dashboard') renderIeDashboard();
      if(sub==='lineconfig') renderIeLineConfig();
      if(sub==='data') renderIeData();
      if(sub==='users') renderIeUsers();
    });
  }
  // reset ke tab dashboard tiap kali masuk/login ulang
  document.querySelectorAll('#ieSubnav button').forEach(b=>b.classList.toggle('active', b.dataset.sub==='dashboard'));
  ['dashboard','lineconfig','data','users'].forEach(s=>{
    document.getElementById('ie-'+s).classList.toggle('hidden', s!=='dashboard');
  });
  renderIeDashboard();
}

async function renderIeData(){
  const root = document.getElementById('ie-data');
  root.innerHTML = `

      </div>
      <button class="btn ghost sm" id="dataFilterBtn">Terapkan Filter</button>
      <button class="btn ghost sm" id="dataExportBtn">Export Excel</button>

      <h3 style="margin-top:20px;">Qty per Slot (kumulatif)</h3>
      <div class="tbl-wrap">
        <table><thead><tr><th>Line</th><th>Tanggal</th><th>Slot</th><th>Qty Kumulatif</th><th>Produksi Slot</th></tr></thead>
        <tbody id="dataQtyBody"></tbody></table>
      </div>

      <h3 style="margin-top:20px;">Absensi</h3>
      <div class="tbl-wrap">
        <table><thead><tr><th>Line</th><th>Tanggal</th><th>Hadir</th><th>Tidak Hadir</th></tr></thead>
        <tbody id="dataAttBody"></tbody></table>
      </div>
    </div>
  `;

  let lastQty = [], lastAtt = [];

  async function load(){
    const date = document.getElementById('dataDate').value;
    const line = document.getElementById('dataLine').value;
    let qPath = '/qty-logs?date=' + date;
    let aPath = '/attendance?date=' + date;
    if(line){ qPath += '&line='+encodeURIComponent(line); aPath += '&line='+encodeURIComponent(line); }

    document.getElementById('dataQtyBody').innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--muted);">Memuat...</td></tr>';
    document.getElementById('dataAttBody').innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--muted);">Memuat...</td></tr>';

    try{
      const [qty, att] = await Promise.all([apiGet(qPath), apiGet(aPath)]);
      lastQty = qty; lastAtt = att;
      if(qty.length){
        const byLine = {};
        qty.forEach(q=>{ (byLine[q.line]=byLine[q.line]||[]).push(q); });
        const rowsHtml = [];
        Object.keys(byLine).sort().forEach(ln=>{
          const sorted = byLine[ln].slice().sort((a,b)=>SLOTS.indexOf(a.slot)-SLOTS.indexOf(b.slot));
          let prev = 0;
          sorted.forEach(q=>{
            const cum = Number(q.qty)||0;
            const inc = cum - prev;
            prev = cum;
            rowsHtml.push(`<tr><td>${q.line}</td><td>${fmtDate(q.date)}</td><td>${q.slot}</td><td class="num">${fmtNum(cum)}</td><td class="num">${fmtNum(inc)}</td></tr>`);
          });
        });
        document.getElementById('dataQtyBody').innerHTML = rowsHtml.join('');
      } else {
        document.getElementById('dataQtyBody').innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--muted);">Tidak ada data.</td></tr>';
      }
      document.getElementById('dataAttBody').innerHTML = att.length
        ? att.sort((a,b)=>a.line.localeCompare(b.line))
             .map(a=>`<tr><td>${a.line}</td><td>${fmtDate(a.date)}</td><td class="num">${fmtNum(a.present_count)}</td><td class="num">${fmtNum(a.absent_count)}</td></tr>`).join('')
        : '<tr><td colspan="4" style="text-align:center;color:var(--muted);">Tidak ada data.</td></tr>';
    }catch(err){
      showToast('Gagal memuat data: '+err.message);
    }
  }

  document.getElementById('dataFilterBtn').addEventListener('click', load);
  document.getElementById('dataExportBtn').addEventListener('click', ()=>{
    if(!lastQty.length && !lastAtt.length){ showToast('Tidak ada data untuk diexport.'); return; }
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(lastQty), 'Qty per Slot');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(lastAtt), 'Absensi');
    XLSX.writeFile(wb, 'Data_Produksi_' + document.getElementById('dataDate').value + '.xlsx');
    showToast('File berhasil diexport.');
  });

  load();
}

          <td>${isMe?'-':`<button class="btn danger sm" onclick="adminDeleteUser('${u.id}')">Hapus</button>`}</td>
        </tr>`;
      }).join('');

      document.querySelectorAll('.admRoleSelect').forEach(sel=>{
        sel.addEventListener('change', async ()=>{
          try{
            await apiPatch('/admin/users', { id: sel.dataset.id, role: sel.value });
            showToast('Role diperbarui.');
            loadUsers();
          }catch(err){ showToast('Gagal: '+err.message); loadUsers(); }
        });
      });
      document.querySelectorAll('.admLineSelect').forEach(sel=>{
        sel.addEventListener('change', async ()=>{
          try{
            await apiPatch('/admin/users', { id: sel.dataset.id, line: sel.value || null });
            showToast('Line diperbarui.');
          }catch(err){ showToast('Gagal: '+err.message); loadUsers(); }
        });
      });
    }catch(err){
      body.innerHTML = '<tr><td colspan="6" style="color:#c0392b;">Gagal memuat: '+err.message+'</td></tr>';
    }
  }

  window.adminDeleteUser = async function(id){
    if(!confirm('Hapus user ini secara permanen?')) return;
    try{
      await apiDelete('/admin/users?id='+encodeURIComponent(id));
      showToast('User dihapus.');
      loadUsers();
    }catch(err){ showToast('Gagal: '+err.message); }
  };

  loadUsers();
}

// ---------- Init ----------
if (sbClient) {
  initAuth().catch(e=>{
    const box = document.getElementById('fatalError');
    if(box){ box.style.display='block'; box.textContent = 'Gagal inisialisasi: ' + e.message; }
  });
}
</script>
</body>
</html>
