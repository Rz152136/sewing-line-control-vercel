<style>
  :root{
    --page-bg:#eef3f0; --bg:#f6f9f7; --panel:#ffffff; --panel2:#f2f6f3; --panel3:#eaf3ee;
    --ink:#152a21; --line:#e5ebe7; --muted:#748a7e; --faint:#a6b7ac;
    --accent:#1f6d4c; --accent-soft:#dceee3; --accent-ink:#164f38;
    --amber:#e8a23a; --amber-ink:#7a4e05; --watch-bg:#fcf0dd;
    --green:#1f9e6b; --green-bg:#e1f5ea;
    --red:#e15c5c; --red-bg:#fce6e6;
    --mono:'IBM Plex Mono',monospace; --disp:'Plus Jakarta Sans',sans-serif; --body:'Inter',sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--page-bg);color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased;}
  ::selection{background:var(--accent-soft);color:var(--accent-ink);}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent) !important;box-shadow:0 0 0 3px var(--accent-soft);}

  #appRoot{max-width:1180px;margin:18px auto;background:var(--panel);border-radius:24px;overflow:hidden;box-shadow:0 24px 60px -30px rgba(21,42,33,.28);border:1px solid var(--line);}

  header.topbar{background:var(--panel);color:var(--ink);padding:16px 22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;border-bottom:1px solid var(--line);}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand .mark{width:38px;height:38px;border-radius:11px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-weight:700;font-size:14px;}
  .brand h1{font-family:var(--disp);font-size:17px;margin:0;font-weight:800;color:var(--ink);}
  .brand p{margin:0;font-size:11px;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;}
  .user-chip{display:flex;align-items:center;gap:8px;font-size:12.5px;flex-wrap:wrap;}
  .role-badge{font-family:var(--mono);font-size:10.5px;font-weight:600;padding:3px 10px;border-radius:999px;text-transform:uppercase;letter-spacing:.03em;}
  .role-badge.ie{background:var(--accent-soft);color:var(--accent-ink);}
  .role-badge.supervisor{background:var(--green-bg);color:var(--green);}
  .role-badge.tamu{background:var(--panel2);color:var(--muted);}
  .line-badge{font-family:var(--mono);font-size:10.5px;font-weight:600;padding:3px 10px;border-radius:999px;background:var(--accent);color:#fff;}
  #logoutBtn{background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:6px 13px;font-size:12px;cursor:pointer;color:var(--ink);font-weight:600;}
  #logoutBtn:hover{background:var(--panel3);}

  main{max-width:1100px;margin:0 auto;padding:22px;background:var(--bg);}
  .panel{background:var(--panel);border-radius:16px;padding:20px;box-shadow:0 1px 3px rgba(21,42,33,.05);margin-bottom:18px;border:1px solid var(--line);}
  .panel h2{font-family:var(--disp);font-size:19px;margin:0 0 4px;font-weight:800;}
  .panel h3{font-family:var(--disp);font-size:14.5px;margin:0 0 12px;color:var(--ink);font-weight:700;}
  .sub{color:var(--muted);font-size:12.5px;margin:0 0 16px;}

  /* ---- Period toggle ---- */
  .period-toggle{display:inline-flex;background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:3px;gap:2px;margin-bottom:16px;}
  .period-toggle button{border:none;cursor:pointer;padding:7px 15px;border-radius:999px;font-size:12.5px;font-weight:700;font-family:var(--body);background:transparent;color:var(--muted);}
  .period-toggle button.active{background:var(--accent);color:#fff;box-shadow:0 6px 14px -6px rgba(31,109,76,.5);}

  /* ---- KPI cards ---- */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:20px;}
  .kpi{border:1px solid var(--line);border-radius:16px;padding:15px 16px;background:var(--panel);transition:box-shadow .18s ease, transform .18s ease;}
  .kpi:hover{box-shadow:0 10px 24px -12px rgba(21,42,33,.18);transform:translateY(-1px);}
  .kpi .icn{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
  .kpi .icn svg{width:16px;height:16px;}
  .kpi .lbl{font-size:12px;color:var(--muted);font-weight:600;font-family:var(--body);}
  .kpi .val{font-family:var(--disp);font-size:23px;font-weight:800;margin-top:3px;color:var(--ink);}
  .kpi .val small{font-size:11.5px;font-weight:600;color:var(--faint);}

  /* ---- Per-line cards (andon) ---- */
  .andon{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;}
  .andon .cell{border:1px solid var(--line);border-radius:14px;padding:14px 15px;background:var(--panel);transition:box-shadow .18s ease, transform .18s ease;}
  .andon .cell:hover{box-shadow:0 10px 24px -12px rgba(21,42,33,.18);transform:translateY(-1px);}
  .andon .cell.empty{opacity:.6;}
  .andon .cell .row-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
  .andon .cell .ln{font-family:var(--disp);font-weight:800;font-size:15.5px;color:var(--ink);}
  .andon .cell .pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap;}
  .andon .cell.ok .pill{background:var(--green-bg);color:var(--green);}
  .andon .cell.watch .pill{background:var(--watch-bg);color:var(--amber-ink);}
  .andon .cell.risk .pill{background:var(--red-bg);color:var(--red);}
  .andon .cell.empty .pill{background:var(--panel2);color:var(--muted);}
  .andon .cell .bar-track{height:7px;border-radius:999px;background:var(--panel2);overflow:hidden;margin:5px 0 12px;}
  .andon .cell .bar-fill{height:100%;border-radius:999px;}
  .andon .cell.ok .bar-fill{background:var(--green);}
  .andon .cell.watch .bar-fill{background:var(--amber);}
  .andon .cell.risk .bar-fill{background:var(--red);}
  .andon .cell.empty .bar-fill{background:var(--faint);}
  .andon .cell .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .andon .cell .metric{font-size:11px;color:var(--muted);}
  .andon .cell .metric b{display:block;color:var(--ink);font-family:var(--mono);font-size:13.5px;font-weight:700;margin-top:1px;}

  .legend-row{display:flex;gap:14px;font-size:11.5px;color:var(--muted);flex-wrap:wrap;margin:2px 0 12px;}
  .legend-row span{display:inline-flex;align-items:center;gap:5px;}
  .legend-row i{width:8px;height:8px;border-radius:50%;display:inline-block;}

  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
  .field label{font-size:11px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
  .field input,.field select,.field textarea{padding:9px 11px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-family:var(--body);background:var(--panel2);}
  .field-row{display:flex;gap:12px;flex-wrap:wrap;}
  .field-row .field{flex:1;min-width:140px;}

  .btn{border:none;border-radius:999px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--body);}
  .btn.primary{background:var(--accent);color:#fff;box-shadow:0 8px 18px -8px rgba(31,109,76,.5);}
  .btn.primary:hover{background:var(--accent-ink);}
  .btn.ghost{background:var(--panel);border:1px solid var(--line);color:var(--ink);}
  .btn.ghost:hover{background:var(--panel2);}
  .btn.danger{background:var(--red-bg);color:var(--red);}
  .btn.sm{padding:6px 12px;font-size:12px;}
  .btn:disabled{opacity:.6;cursor:default;}

  .tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px;}
  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap;}
  th{background:var(--panel2);font-family:var(--mono);font-size:10.5px;text-transform:uppercase;color:var(--muted);letter-spacing:.4px;}
  tr:last-child td{border-bottom:none;}
  td.num{font-family:var(--mono);text-align:right;}

  .subnav{display:flex;gap:2px;margin-bottom:16px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
  .subnav button{background:none;border:none;padding:10px 14px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;font-family:var(--body);}
  .subnav button.active{color:var(--accent);border-bottom-color:var(--accent);}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:2000;max-width:90vw;text-align:center;}
  .toast.show{opacity:1;}

  .chart-box{border:1px solid var(--line);border-radius:14px;padding:16px;margin-top:16px;background:var(--panel);}
  .chart-grid{display:grid;grid-template-columns:minmax(0,1.7fr) minmax(0,1fr);gap:14px;margin-top:16px;}
  @media (max-width:760px){ .chart-grid{grid-template-columns:1fr;} #appRoot{margin:0;border-radius:0;} }
  .donut-wrap{display:flex;flex-direction:column;align-items:center;}
  .donut-center{font-family:var(--disp);font-weight:800;font-size:20px;color:var(--ink);}

  #loginScreen{position:fixed;inset:0;background:var(--page-bg);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
  #loginScreen .box{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:28px 24px;width:100%;max-width:340px;box-shadow:0 20px 45px -24px rgba(21,42,33,.25);}
  #loginScreen h2{margin:0 0 4px;font-size:19px;font-family:var(--disp);font-weight:800;}
  #loginScreen p.sub{margin:0 0 18px;}
  #loginScreen .btn{width:100%;}
  #loginError{color:var(--red);font-size:12.5px;margin:-6px 0 12px;min-height:1em;}
  #fatalError{display:none;background:var(--red-bg);color:var(--red);font-size:12px;padding:10px 12px;border-radius:10px;margin-bottom:14px;word-break:break-word;}
  #appRoot{display:none;}
  .hidden{display:none !important;}
</style>
</head>

<script>
const LINES = ['1A','1B','2','3','4','5','8','9A','9B','11A','11B','12A','12B','13A','13B','14'];
const SLOTS = ['08:00-11:00','11:00-14:00','14:00-17:00','17:00-20:00','20:00-23:00','23:00-02:00','02:00-05:00','05:00-08:00'];
const API_BASE = '/api';

// ---------- utility ----------
function todayStr(){ return new Date().toISOString().slice(0,10); }
function fmtNum(n,dec=0){ if(n===null||n===undefined||isNaN(n)) return '-'; return Number(n).toLocaleString('id-ID',{minimumFractionDigits:dec,maximumFractionDigits:dec}); }
function fmtDate(d){ if(!d) return '-'; return new Date(d+'T00:00:00').toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}); }
function statusClass(eff){ if(eff===null) return 'empty'; if(eff>=100) return 'ok'; if(eff>=85) return 'watch'; return 'risk'; }
let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 3200);
}

// ---------- periode: harian / mingguan / bulanan ----------
function toDateStr(d){ return d.toISOString().slice(0,10); }
function datesBetween(start,end){
  const out=[]; const cur=new Date(start.getFullYear(),start.getMonth(),start.getDate());
  const last=new Date(end.getFullYear(),end.getMonth(),end.getDate());
  while(cur<=last){ out.push(toDateStr(cur)); cur.setDate(cur.getDate()+1); }
  return out;
}
function startOfWeek(d){ const day=d.getDay(); const diff=day===0?6:day-1; const s=new Date(d); s.setDate(d.getDate()-diff); return s; }
function startOfMonth(d){ return new Date(d.getFullYear(), d.getMonth(), 1); }
function periodDatesFor(period){
  const now = new Date();
  if(period==='weekly') return datesBetween(startOfWeek(now), now);
  if(period==='monthly') return datesBetween(startOfMonth(now), now);
  return [toDateStr(now)];
}
function periodLabelText(period){ return period==='weekly' ? 'minggu ini' : period==='monthly' ? 'bulan ini' : 'hari ini'; }
function periodRangeText(dates, period){
  if(period==='daily') return new Date(dates[0]+'T00:00:00').toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const first = new Date(dates[0]+'T00:00:00').toLocaleDateString('id-ID',{day:'numeric',month:'short'});
  const last = new Date(dates[dates.length-1]+'T00:00:00').toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'});
  return first+' – '+last+' · '+dates.length+' hari';
}
function periodToggleHtml(active, groupId){
  const opts = [['daily','Harian'],['weekly','Mingguan'],['monthly','Bulanan']];
  return `<div class="period-toggle" data-group="${groupId}">${opts.map(([k,l])=>
    `<button data-period="${k}" class="${k===active?'active':''}">${l}</button>`).join('')}</div>`;
}

// ---------- ikon kecil untuk kartu KPI ----------
const ICONS = {
  box: '<path d="M21 8l-9-5-9 5 9 5 9-5z"/><path d="M3 8v8l9 5 9-5V8"/><path d="M12 13v8"/>',
  target: '<circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r=".5"/>',
  shield: '<path d="M12 3l7 3v6c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6l7-3z"/><path d="M9 12l2 2 4-4"/>',
  users: '<circle cx="9" cy="8" r="3.2"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/><circle cx="17" cy="9" r="2.6"/><path d="M21 20c0-2.6-1.7-4.8-4-5.6"/>',
  gauge: '<path d="M4 15a8 8 0 1 1 16 0"/><path d="M12 15l4-5"/><circle cx="12" cy="15" r="1"/>',
  trend: '<path d="M3 17l6-6 4 4 8-8"/><path d="M15 7h6v6"/>',
  cog: '<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09A1.7 1.7 0 0 0 9 19.4a1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1z"/>',
};
function iconSvg(name){
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]||ICONS.box}</svg>`;
}
function kpiCard({icon,tint,color,label,value,unit,sub}){
  return `
    <div class="kpi">
      <div class="icn" style="background:${tint};color:${color};">${iconSvg(icon)}</div>
      <div class="lbl">${label}</div>
      <div class="val">${value}${unit?` <small>${unit}</small>`:''}</div>
      ${sub?`<div class="sub" style="margin:5px 0 0;">${sub}</div>`:''}
    </div>`;
}


// ---------- Auth & role state ----------
let sbClient;
try {
  sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
} catch (e) {
  const box = document.getElementById('fatalError');
  box.style.display = 'block';
  box.textContent = 'Gagal membuat koneksi Supabase: ' + e.message + '. Cek ulang SUPABASE_URL & SUPABASE_ANON_KEY di index.html.';
}
let currentUser = null; // { id, email, fullName, role, line }

async function authHeader(){
  const { data:{ session } } = await sbClient.auth.getSession();
  if(!session) return {};
  return { 'Authorization': 'Bearer ' + session.access_token };
}

async function apiGet(path){
  const res = await fetch(API_BASE + path, { headers: await authHeader() });
  if(!res.ok){ const b = await res.json().catch(()=>({})); throw new Error(b.error || ('HTTP '+res.status)); }
  return res.json();
}
async function apiPost(path, body){
  const res = await fetch(API_BASE + path, {
    method: 'POST',
    headers: Object.assign({'Content-Type':'application/json'}, await authHeader()),
    body: JSON.stringify(body)
  });
  if(!res.ok){ const b = await res.json().catch(()=>({})); throw new Error(b.error || ('HTTP '+res.status)); }
  return res.json();
}
async function apiPatch(path, body){
  const res = await fetch(API_BASE + path, {
    method: 'PATCH',
    headers: Object.assign({'Content-Type':'application/json'}, await authHeader()),
    body: JSON.stringify(body)
  });
  if(!res.ok){ const b = await res.json().catch(()=>({})); throw new Error(b.error || ('HTTP '+res.status)); }
  return res.json();
}
async function apiDelete(path){
  const res = await fetch(API_BASE + path, { method:'DELETE', headers: await authHeader() });
  if(!res.ok){ const b = await res.json().catch(()=>({})); throw new Error(b.error || ('HTTP '+res.status)); }
  return res.json();
}

document.getElementById('loginForm').addEventListener('submit', async function(ev){
  ev.preventDefault();
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  errEl.textContent = '';
  btn.disabled = true; btn.textContent = 'Memproses...';
  const { error } = await sbClient.auth.signInWithPassword({ email, password });
  btn.disabled = false; btn.textContent = 'Masuk';
  if(error){ errEl.textContent = 'Login gagal: email atau password salah.'; return; }
  await showApp();
});

document.getElementById('logoutBtn').addEventListener('click', async ()=>{
  await sbClient.auth.signOut();
  showLogin();
});

function showLogin(){
  document.getElementById('appRoot').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

async function loadCurrentUser(){
  const headers = await authHeader();
  const res = await fetch(API_BASE + '/me', { headers });
  if(!res.ok) throw new Error('Gagal memuat profil user.');
  return res.json();
}

async function showApp(){
  try{
    currentUser = await loadCurrentUser();
  }catch(err){
    showToast('Gagal memuat profil: ' + err.message);
    await sbClient.auth.signOut();
    showLogin();
    return;
  }
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appRoot').style.display = 'block';
  document.getElementById('userName').textContent = currentUser.fullName || currentUser.email;
  document.getElementById('userRoleBadge').textContent = currentUser.role;
  document.getElementById('userRoleBadge').className = 'role-badge ' + currentUser.role;
  const lineBadge = document.getElementById('userLineBadge');
  if(currentUser.line){ lineBadge.textContent = 'LINE ' + currentUser.line; lineBadge.classList.remove('hidden'); }
  else { lineBadge.classList.add('hidden'); }

  ['view-tamu','view-supervisor','view-ie'].forEach(id=>document.getElementById(id).classList.add('hidden'));

  if(currentUser.role === 'tamu'){
    document.getElementById('view-tamu').classList.remove('hidden');
    renderTamuView();
  } else if(currentUser.role === 'supervisor'){
    document.getElementById('view-supervisor').classList.remove('hidden');
    renderSupervisorView();
  } else if(currentUser.role === 'ie'){
    document.getElementById('view-ie').classList.remove('hidden');
    initIeView();
  } else {
    showToast('Role tidak dikenali: ' + currentUser.role);
  }
}

async function initAuth(){
  const { data:{ session } } = await sbClient.auth.getSession();
  if(session){ await showApp(); } else { showLogin(); }
}

// ================================================================
// Dashboard helper (dipakai oleh Tamu & sub-tab Dashboard IE)
// period: 'daily' | 'weekly' | 'monthly'
// ================================================================
async function buildDashboardHtml(period){
  const dates = periodDatesFor(period);

  const perDate = await Promise.all(dates.map(async d=>{
    const [configs, qtyLogs, attendances] = await Promise.all([
      apiGet('/line-config?date=' + d),
      apiGet('/qty-logs?date=' + d),
      apiGet('/attendance?date=' + d),
    ]);
    return { configs, qtyLogs, attendances };
  }));

  const perLine = {};
  LINES.forEach(l => perLine[l] = { line:l, target:0, output:0, present:0, absent:0, mesin:0, mcShift:0, hasConfig:false, style:'' });

  perDate.forEach(({configs, qtyLogs, attendances})=>{
    configs.forEach(c=>{
      if(!perLine[c.line]) perLine[c.line] = { line:c.line, target:0, output:0, present:0, absent:0, mesin:0, mcShift:0, hasConfig:false, style:'' };
      const target = c.target_output > 0 ? c.target_output : (c.smv>0 ? (c.mp*c.wh*60/c.smv) : 0);
      perLine[c.line].target += target;
      perLine[c.line].mesin = Number(c.mesin) || perLine[c.line].mesin;
      perLine[c.line].mcShift += Number(c.mc_shift)||0;
      perLine[c.line].style = c.style || perLine[c.line].style;
      perLine[c.line].hasConfig = true;
    });
    const dayOutput = {};
    qtyLogs.forEach(q=>{
      if(!perLine[q.line]) perLine[q.line] = { line:q.line, target:0, output:0, present:0, absent:0, mesin:0, mcShift:0, hasConfig:false, style:'' };
      // qty bersifat kumulatif per slot per hari, jadi output harian = nilai kumulatif TERTINGGI hari itu.
      const cum = Number(q.qty)||0;
      if(!dayOutput[q.line] || cum > dayOutput[q.line]) dayOutput[q.line] = cum;
    });
    Object.keys(dayOutput).forEach(l=>{ perLine[l].output += dayOutput[l]; });
    attendances.forEach(a=>{
      if(!perLine[a.line]) perLine[a.line] = { line:a.line, target:0, output:0, present:0, absent:0, mesin:0, mcShift:0, hasConfig:false, style:'' };
      perLine[a.line].present += Number(a.present_count)||0;
      perLine[a.line].absent += Number(a.absent_count)||0;
    });
  });

  const rows = LINES.map(l=>perLine[l]);
  // Productivity = Output ÷ MC Shift. MC Shift diisi manual oleh IE di tab Variabel Line
  // (total penggunaan mesin dalam satu kali shift), diakumulasi sepanjang periode yang dipilih.
  rows.forEach(r=>{ r.productivity = r.mcShift>0 ? (r.output/r.mcShift) : null; });
  rows.forEach(r=>{ r.eff = r.target>0 ? Math.round((r.output/r.target)*100) : null; });
  rows.forEach(r=>{ r.cls = (r.hasConfig || r.output>0) ? statusClass(r.eff) : 'empty'; });

  const activeRows = rows.filter(r=>r.hasConfig || r.output>0);
  const totalOutput = rows.reduce((s,r)=>s+r.output,0);
  const totalTarget = rows.reduce((s,r)=>s+r.target,0);
  const totalPresent = rows.reduce((s,r)=>s+r.present,0);
  const totalAbsent = rows.reduce((s,r)=>s+r.absent,0);
  const totalMesin = rows.reduce((s,r)=>s+r.mesin,0);
  const totalMcShift = rows.reduce((s,r)=>s+r.mcShift,0);
  const avgEff = totalTarget>0 ? Math.round((totalOutput/totalTarget)*100) : null;
  const overallProductivity = totalMcShift>0 ? (totalOutput/totalMcShift) : null;
  const absenPct = (totalPresent+totalAbsent)>0 ? (totalAbsent/(totalPresent+totalAbsent))*100 : null;

  const counts = { ok:0, watch:0, risk:0, empty:0 };
  rows.forEach(r=>counts[r.cls]++);

  const pNoun = periodLabelText(period);
  const rangeText = periodRangeText(dates, period);

  const cells = rows.map(r=>{
    const barPct = r.eff===null ? 4 : Math.max(4, Math.min(r.eff, 100));
    const pillLabel = r.cls==='ok' ? 'Baik' : r.cls==='watch' ? 'Waspada' : r.cls==='risk' ? 'Kritis' : 'Belum Update';
    return `
      <div class="andon cell ${r.cls}">
        <div class="row-top">
          <div>
            <div class="ln">Line ${r.line}</div>
            <div class="sub" style="margin:2px 0 0;min-height:14px;">${r.style || 'Belum ada style running'}</div>
          </div>
          <span class="pill">${pillLabel}</span>
        </div>
        <div class="sub" style="margin:0 0 3px;display:flex;justify-content:space-between;"><span>Efisiensi</span><b style="font-family:var(--mono);color:var(--ink);">${r.eff===null?'-':r.eff+'%'}</b></div>
        <div class="bar-track"><div class="bar-fill" style="width:${barPct}%;"></div></div>
        <div class="grid2">
          <div class="metric">Output<b>${fmtNum(r.output)}</b></div>
          <div class="metric">MC Shift<b>${r.mcShift>0?fmtNum(r.mcShift,1):'-'}</b></div>
          <div class="metric">Productivity<b>${r.productivity===null?'-':fmtNum(r.productivity,2)}</b></div>
          <div class="metric">Hadir/Absen<b>${fmtNum(r.present)}/${fmtNum(r.absent)}</b></div>
        </div>
      </div>`;
  }).join('');

  const mcRows = activeRows.length ? activeRows : rows.filter(r=>r.hasConfig);
  const mcTableRows = mcRows.map(r=>`
    <tr>
      <td>LINE ${r.line}</td>
      <td class="num">${fmtNum(r.output)}</td>
      <td class="num">${fmtNum(r.mesin)}</td>
      <td class="num">${r.mcShift>0?fmtNum(r.mcShift,1):'-'}</td>
      <td class="num">${r.productivity===null?'-':fmtNum(r.productivity,2)}</td>
    </tr>`).join('');

  const uid = period; // suffix unik untuk canvas id

  const html = `
    ${periodToggleHtml(period, 'dash')}
    <p class="sub" style="margin-top:-8px;">${rangeText}</p>

    <div class="kpis">
      ${kpiCard({icon:'box',tint:'var(--accent-soft)',color:'var(--accent)',label:'Total Output',value:fmtNum(totalOutput),unit:'unit',sub:'Total produksi '+pNoun})}
      ${kpiCard({icon:'target',tint:'var(--panel3)',color:'var(--accent)',label:'Total Target',value:fmtNum(totalTarget),unit:'unit'})}
      ${kpiCard({icon:'shield',tint: avgEff===null? 'var(--panel3)' : avgEff>=100?'var(--green-bg)':avgEff>=85?'var(--watch-bg)':'var(--red-bg)', color: avgEff===null?'var(--muted)':avgEff>=100?'var(--green)':avgEff>=85?'var(--amber-ink)':'var(--red)', label:'Rata-rata Efisiensi', value:avgEff===null?'-':avgEff+'%', sub:'Target ≥ 100%'})}
      ${kpiCard({icon:'users',tint: absenPct!==null && absenPct>5 ? 'var(--red-bg)':'var(--green-bg)', color: absenPct!==null && absenPct>5 ? 'var(--red)':'var(--green)', label:'Hadir / Tidak Hadir', value:fmtNum(totalPresent), unit:'/ '+fmtNum(totalAbsent), sub: absenPct===null?'Belum ada data':'Absensi '+fmtNum(absenPct,1)+'%'})}
      ${kpiCard({icon:'cog',tint:'var(--panel3)',color:'var(--accent)',label:'Total Mesin Digunakan',value:fmtNum(totalMesin),unit:'mesin'})}
      ${kpiCard({icon:'gauge',tint:'var(--panel3)',color:'var(--accent)',label:'Total MC Shift',value:fmtNum(totalMcShift,1),unit:'mesin-shift',sub:'Jumlah penggunaan mesin '+pNoun})}
      ${kpiCard({icon:'trend',tint:'var(--accent-soft)',color:'var(--accent)',label:'Rata-rata Productivity',value:overallProductivity===null?'-':fmtNum(overallProductivity,2),unit:'pcs/mc-shift'})}
    </div>

    <div class="chart-grid">
      <div class="chart-box">
        <h3 style="margin:0 0 2px;">Efisiensi per Line</h3>
        <p class="sub" style="margin:0 0 10px;">Target garis putus-putus di 100%</p>
        <canvas id="effChart_${uid}" height="115"></canvas>
      </div>
      <div class="chart-box">
        <h3 style="margin:0 0 2px;">Ringkasan Status</h3>
        <p class="sub" style="margin:0 0 6px;">Sebaran kondisi seluruh line</p>
        <div class="donut-wrap">
          <div style="position:relative;width:150px;height:150px;">
            <canvas id="statusDonut_${uid}" width="150" height="150"></canvas>
            <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;">
              <div class="donut-center">${avgEff===null?'-':avgEff+'%'}</div>
              <div class="sub" style="margin:0;font-size:10px;">Efisiensi</div>
            </div>
          </div>
          <div class="legend-row" style="margin-top:10px;">
            <span><i style="background:var(--green);"></i>Baik ${counts.ok}</span>
            <span><i style="background:var(--amber);"></i>Waspada ${counts.watch}</span>
            <span><i style="background:var(--red);"></i>Kritis ${counts.risk}</span>
            <span><i style="background:var(--faint);"></i>Belum ${counts.empty}</span>
          </div>
        </div>
      </div>
    </div>

    <h3 style="margin-top:22px;">Status per Line</h3>
    <div class="legend-row">
      <span><i style="background:var(--green);"></i>Baik</span>
      <span><i style="background:var(--amber);"></i>Waspada</span>
      <span><i style="background:var(--red);"></i>Kritis</span>
    </div>
    <div class="andon">${cells}</div>

    <h3 style="margin-top:22px;">Summary MC Shift &amp; Productivity per Line</h3>
    <p class="sub" style="margin:-6px 0 12px;">MC Shift = total penggunaan mesin dalam satu kali shift (diisi manual oleh IE di tab Variabel Line), diakumulasi sepanjang periode. Productivity = Output ÷ MC Shift.</p>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Line</th><th>Output</th><th>Mesin</th><th>MC Shift</th><th>Productivity</th></tr></thead>
        <tbody>${mcTableRows || '<tr><td colspan="5" style="text-align:center;color:var(--muted);">Belum ada data.</td></tr>'}</tbody>
      </table>
    </div>
    <div class="chart-box"><canvas id="mcChart_${uid}" height="90"></canvas></div>

    <h3 style="margin-top:20px;">Grafik Productivity per Line</h3>
    <div class="chart-box"><canvas id="prodChart_${uid}" height="90"></canvas></div>
  `;
  return { html, rows: mcRows, counts, uid };
}

function renderEffChart(canvasId, rows){
  const ctx = document.getElementById(canvasId);
  if(!ctx || !window.Chart) return;
  const labelled = rows.filter(r=>r.target>0 || r.output>0);
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labelled.map(r=>'Line '+r.line),
      datasets: [{
        label: 'Efisiensi (%)',
        data: labelled.map(r=> r.target>0 ? Math.round((r.output/r.target)*100) : 0),
        backgroundColor: labelled.map(r=>{
          const eff = r.target>0 ? (r.output/r.target)*100 : 0;
          if(eff>=100) return '#1f9e6b';
          if(eff>=85) return '#e8a23a';
          return '#e15c5c';
        }),
        borderRadius: 6,
        maxBarThickness: 26,
      }]
    },
    options: {
      responsive:true, plugins:{ legend:{ display:false } },
      scales:{ y:{ beginAtZero:true, grid:{ color:'#e5ebe7' } }, x:{ grid:{ display:false } } }
    }
  });
}

function renderStatusDonut(canvasId, counts){
  const ctx = document.getElementById(canvasId);
  if(!ctx || !window.Chart) return;
  new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Baik','Waspada','Kritis','Belum Update'],
      datasets: [{
        data: [counts.ok, counts.watch, counts.risk, counts.empty],
        backgroundColor: ['#1f9e6b','#e8a23a','#e15c5c','#e5ebe7'],
        borderWidth: 0,
      }]
    },
    options: { responsive:true, cutout:'72%', plugins:{ legend:{ display:false }, tooltip:{ enabled:true } } }
  });
}

function renderMcShiftChart(canvasId, rows){
  const ctx = document.getElementById(canvasId);
  if(!ctx || !window.Chart) return;
  const labelled = rows.filter(r=>r.mcShift>0);
  if(!labelled.length) return;
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labelled.map(r=>'Line '+r.line),
      datasets: [{
        label: 'MC Shift (total penggunaan mesin/shift)',
        data: labelled.map(r=> Math.round(r.mcShift*10)/10),
        backgroundColor: '#1f6d4c',
        borderRadius: 6,
        maxBarThickness: 26,
      }]
    },
    options: {
      responsive:true, plugins:{ legend:{ display:false } },
      scales:{ y:{ beginAtZero:true, grid:{ color:'#e5ebe7' } }, x:{ grid:{ display:false } } }
    }
  });
}

function renderProductivityChart(canvasId, rows){
  const ctx = document.getElementById(canvasId);
  if(!ctx || !window.Chart) return;
  const labelled = rows.filter(r=>r.productivity!==null);
  if(!labelled.length) return;
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labelled.map(r=>'Line '+r.line),
      datasets: [{
        label: 'Productivity (Output ÷ MC Shift)',
        data: labelled.map(r=> Math.round(r.productivity*100)/100),
        backgroundColor: '#e8a23a',
        borderRadius: 6,
        maxBarThickness: 26,
      }]
    },
    options: {
      responsive:true, plugins:{ legend:{ display:false } },
      scales:{ y:{ beginAtZero:true, grid:{ color:'#e5ebe7' } }, x:{ grid:{ display:false } } }
    }
  });
}

let tamuPeriod = 'daily';

  const root = document.getElementById('view-tamu');
  root.innerHTML = `

async function renderSupervisorView(){
  const root = document.getElementById('view-supervisor');
  const line = currentUser.line;
  const date = todayStr();

  if(!line){
    root.innerHTML = `<div class="panel"><h2>Belum ada Line</h2><p class="sub">Akun Anda belum diikat ke line tertentu. Hubungi IE untuk mengatur ini di tab Kelola User.</p></div>`;
    return;
  }

  root.innerHTML = `
    <div class="panel">
      <h2>Line ${line}</h2>
      <p class="sub">${fmtDate(date)}</p>

      <h3>Input Qty Produksi (kumulatif per 3 jam)</h3>
      <p class="sub" style="margin:-6px 0 12px;">Isi <b>total produksi kumulatif</b> sejak awal hari sampai jam slot ini — bukan hasil 3 jam terakhir saja. Contoh: jam 08:00-11:00 = 250, jam 11:00-14:00 = 500 (artinya slot ini menghasilkan 250 pcs).</p>
      <form id="qtyForm">
        <div class="field-row">
          <div class="field">
            <label>Slot Jam</label>
            <select id="qtySlot">${SLOTS.map(s=>`<option value="${s}">${s}</option>`).join('')}</select>
          </div>
          <div class="field">
            <label>Qty Kumulatif (pcs)</label>
            <input type="number" id="qtyValue" min="0" required>
          </div>
        </div>
        <p id="qtyHint" class="sub" style="margin:-6px 0 12px;"></p>
        <button type="submit" class="btn primary">Simpan Qty</button>
      </form>
      <div class="tbl-wrap" style="margin-top:14px;">
        <table>
          <thead><tr><th>Slot Jam</th><th>Qty Kumulatif</th><th>Produksi Slot</th><th>Update Terakhir</th></tr></thead>
          <tbody id="qtyLogBody"><tr><td colspan="4" style="text-align:center;color:var(--muted);">Memuat...</td></tr></tbody>
        </table>
      </div>
    </div>

    <div class="panel">
      <h3>Absensi Hari Ini</h3>
      <form id="attForm">
        <div class="field-row">
          <div class="field">
            <label>Jumlah Hadir</label>
            <input type="number" id="attPresent" min="0" required>
          </div>
          <div class="field">
            <label>Jumlah Tidak Hadir</label>
            <input type="number" id="attAbsent" min="0" required>
          </div>
        </div>
        <button type="submit" class="btn primary">Simpan Absensi</button>
      </form>
    </div>
  `;

  let qtyCache = [];
  function updateQtyHint(){
    const slotIdx = SLOTS.indexOf(document.getElementById('qtySlot').value);
    let prevCum = 0, prevSlot = null;
    for(let i=slotIdx-1;i>=0;i--){
      const found = qtyCache.find(l=>l.slot===SLOTS[i]);
      if(found){ prevCum = Number(found.qty)||0; prevSlot = SLOTS[i]; break; }
    }
    document.getElementById('qtyHint').textContent = prevSlot
      ? `Kumulatif terakhir (${prevSlot}): ${fmtNum(prevCum)} pcs — isi total sampai slot ini, bukan hanya tambahannya.`
      : 'Belum ada input sebelumnya hari ini — isi total produksi sejak awal shift sampai slot ini.';
  }

  async function refreshQtyTable(){
    const body = document.getElementById('qtyLogBody');
    try{
      const logs = await apiGet('/qty-logs?line='+encodeURIComponent(line)+'&date='+date);
      qtyCache = logs;
      updateQtyHint();
      if(!logs.length){
        body.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--muted);">Belum ada input hari ini.</td></tr>';
        return;
      }
      const sorted = logs.slice().sort((a,b)=>SLOTS.indexOf(a.slot)-SLOTS.indexOf(b.slot));
      let prev = 0;
      body.innerHTML = sorted.map(l=>{
        const cum = Number(l.qty)||0;
        const inc = cum - prev;
        prev = cum;
        return `<tr><td>${l.slot}</td><td class="num">${fmtNum(cum)}</td><td class="num">${fmtNum(inc)}</td><td>${new Date(l.updated_at).toLocaleTimeString('id-ID')}</td></tr>`;
      }).join('');
    }catch(err){
      body.innerHTML = '<tr><td colspan="4" style="color:var(--red);">Gagal memuat: '+err.message+'</td></tr>';
    }
  }

  async function loadAttendance(){
    try{
      const list = await apiGet('/attendance?line='+encodeURIComponent(line)+'&date='+date);
      if(list.length){
        document.getElementById('attPresent').value = list[0].present_count;
        document.getElementById('attAbsent').value = list[0].absent_count;
      }
    }catch(err){ /* diamkan, form tetap kosong */ }
  }

  document.getElementById('qtySlot').addEventListener('change', updateQtyHint);

  document.getElementById('qtyForm').addEventListener('submit', async (ev)=>{
    ev.preventDefault();
    const slot = document.getElementById('qtySlot').value;
    const qty = document.getElementById('qtyValue').value;
    try{
      await apiPost('/qty-logs', { line, date, slot, qty });
      showToast('Qty kumulatif slot '+slot+' tersimpan.');
      document.getElementById('qtyValue').value = '';
      refreshQtyTable();
    }catch(err){ showToast('Gagal simpan: '+err.message); }
  });

  document.getElementById('attForm').addEventListener('submit', async (ev)=>{
    ev.preventDefault();
    const presentCount = document.getElementById('attPresent').value;
    const absentCount = document.getElementById('attAbsent').value;
    try{
      await apiPost('/attendance', { line, date, presentCount, absentCount });
      showToast('Absensi tersimpan.');
    }catch(err){ showToast('Gagal simpan: '+err.message); }
  });

  refreshQtyTable();
  loadAttendance();
}

function initIeView(){
  const nav = document.getElementById('ieSubnav');
  if(!nav.dataset.bound){
    nav.dataset.bound = '1';
    nav.addEventListener('click', (e)=>{
      if(e.target.tagName !== 'BUTTON') return;
      const sub = e.target.dataset.sub;
      document.querySelectorAll('#ieSubnav button').forEach(b=>b.classList.toggle('active', b===e.target));
      ['dashboard','lineconfig','data','users'].forEach(s=>{
        document.getElementById('ie-'+s).classList.toggle('hidden', s!==sub);
      });
      if(sub==='dashboard') renderIeDashboard();
      if(sub==='lineconfig') renderIeLineConfig();
      if(sub==='data') renderIeData();
      if(sub==='users') renderIeUsers();
    });
  }
  // reset ke tab dashboard tiap kali masuk/login ulang
  document.querySelectorAll('#ieSubnav button').forEach(b=>b.classList.toggle('active', b.dataset.sub==='dashboard'));
  ['dashboard','lineconfig','data','users'].forEach(s=>{
    document.getElementById('ie-'+s).classList.toggle('hidden', s!=='dashboard');
  });
  renderIeDashboard();
}

let iePeriod = 'daily';
async function renderIeDashboard(){
  const root = document.getElementById('ie-dashboard');
  root.innerHTML = `
    <div class="panel">
      <h2>Dashboard Semua Line</h2>
      <div id="ieDashContent">Memuat...</div>
    </div>`;
  await loadIeDashContent();
}
async function loadIeDashContent(){
  const wrap = document.getElementById('ieDashContent');
  wrap.innerHTML = 'Memuat...';
  try{
    const { html, rows, counts, uid } = await buildDashboardHtml(iePeriod);
    wrap.innerHTML = html;
    renderEffChart('effChart_' + uid, rows);
    renderStatusDonut('statusDonut_' + uid, counts);
    renderMcShiftChart('mcChart_' + uid, rows);
    renderProductivityChart('prodChart_' + uid, rows);
    wrap.querySelectorAll('.period-toggle button').forEach(btn=>{
      btn.addEventListener('click', ()=>{ iePeriod = btn.dataset.period; loadIeDashContent(); });
    });
  }catch(err){
    wrap.innerHTML = '<p style="color:var(--red);">Gagal memuat: '+err.message+'</p>';
  }
}

  const root = document.getElementById('ie-lineconfig');
  const date = todayStr();
  root.innerHTML = `

      <h2>Variabel per Line</h2>
      <p class="sub">Style, SMV, target, rencana tanggal — sekali diisi berlaku untuk tanggal tersebut.</p>
      <form id="lcForm">

        </div>
        <div class="field-row">
          <div class="field"><label>SMV</label><input type="number" step="0.01" id="lcSmv" min="0"></div>
          <div class="field"><label>Manpower (MP)</label><input type="number" id="lcMp" min="0"></div>
          <div class="field"><label>Jam Kerja (WH)</label><input type="number" step="0.5" id="lcWh" min="0"></div>
          <div class="field"><label>Target Output (opsional, override)</label><input type="number" id="lcTarget" min="0" placeholder="otomatis dari MP×WH×60/SMV"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Jumlah Mesin Digunakan</label><input type="number" id="lcMesin" min="0" placeholder="jumlah unit mesin di line"></div>
          <div class="field"><label>MC Shift (Total Penggunaan Mesin/Shift)</label><input type="number" step="0.01" id="lcMcShift" min="0" placeholder="misal 45.5 — untuk hitung Productivity"></div>
        </div>
        <div class="field"><label>Catatan</label><textarea id="lcNotes" rows="2"></textarea></div>
        <p id="lcError" style="color:var(--red);font-size:12.5px;min-height:1em;"></p>
        <button type="submit" class="btn primary">Simpan Variabel</button>
      </form>
    </div>
    <div class="panel">
      <h3>Data Tersimpan</h3>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Line</th><th>Tanggal</th><th>Style</th><th>SMV</th><th>MP</th><th>WH</th><th>Mesin</th><th>MC Shift</th><th>Target</th><th></th></tr></thead>
          <tbody id="lcBody"><tr><td colspan="10" style="text-align:center;color:var(--muted);">Memuat...</td></tr></tbody>
        </table>
      </div>
    </div>
  `;

  let lcCache = [];
  async function refreshTable(){
    const body = document.getElementById('lcBody');
    try{
      const list = await apiGet('/line-config');
      lcCache = list;
      if(!list.length){ body.innerHTML = '<tr><td colspan="10" style="text-align:center;color:var(--muted);">Belum ada data.</td></tr>'; return; }
      body.innerHTML = list.map(c=>`
        <tr>
          <td>${c.line}</td><td>${fmtDate(c.date)}</td><td>${c.style||'-'}</td>
          <td class="num">${fmtNum(c.smv,2)}</td><td class="num">${fmtNum(c.mp)}</td><td class="num">${fmtNum(c.wh,1)}</td>
          <td class="num">${fmtNum(c.mesin)}</td>
          <td class="num">${fmtNum(c.mc_shift,1)}</td>
          <td class="num">${fmtNum(c.target_output>0?c.target_output:(c.smv>0?(c.mp*c.wh*60/c.smv):0))}</td>
          <td><button class="btn ghost sm" data-id="${c.id}" onclick="fillLcForm(this.dataset.id)">Edit</button></td>
        </tr>`).join('');
    }catch(err){
      body.innerHTML = '<tr><td colspan="10" style="color:var(--red);">Gagal memuat: '+err.message+'</td></tr>';
    }
  }

  window.fillLcForm = function(id){
    const c = lcCache.find(x=>x.id===id);
    if(!c) return;
    document.getElementById('lcLine').value = c.line;
    document.getElementById('lcDate').value = c.date;
    document.getElementById('lcStyle').value = c.style||'';
    document.getElementById('lcQtyOrder').value = c.qty_order||'';
    document.getElementById('lcPlanStart').value = c.plan_start||'';
    document.getElementById('lcPlanFinish').value = c.plan_finish||'';
    document.getElementById('lcSmv').value = c.smv||'';
    document.getElementById('lcMp').value = c.mp||'';
    document.getElementById('lcWh').value = c.wh||'';
    document.getElementById('lcTarget').value = c.target_output||'';
    document.getElementById('lcMesin').value = c.mesin||'';
    document.getElementById('lcMcShift').value = c.mc_shift||'';
    document.getElementById('lcNotes').value = c.notes||'';
    window.scrollTo({top:0,behavior:'smooth'});
  };

  document.getElementById('lcForm').addEventListener('submit', async (ev)=>{
    ev.preventDefault();
    const errEl = document.getElementById('lcError');
    errEl.textContent = '';
    const payload = {
      line: document.getElementById('lcLine').value,
      date: document.getElementById('lcDate').value,
      style: document.getElementById('lcStyle').value,
      qtyOrder: document.getElementById('lcQtyOrder').value,
      planStart: document.getElementById('lcPlanStart').value,
      planFinish: document.getElementById('lcPlanFinish').value,
      smv: document.getElementById('lcSmv').value,
      mp: document.getElementById('lcMp').value,
      wh: document.getElementById('lcWh').value,
      targetOutput: document.getElementById('lcTarget').value,
      mesin: document.getElementById('lcMesin').value,
      mcShift: document.getElementById('lcMcShift').value,
      notes: document.getElementById('lcNotes').value,
    };
    try{
      await apiPost('/line-config', payload);
      showToast('Variabel line '+payload.line+' tersimpan.');
      refreshTable();
    }catch(err){ errEl.textContent = 'Gagal: '+err.message; }
  });

  refreshTable();
}

// ---------- Data Produksi (oversight semua line, + export) ----------
async function renderIeData(){
  const root = document.getElementById('ie-data');
  root.innerHTML = `
    <div class="panel">
      <h2>Data Produksi</h2>
      <div class="field-row">
        <div class="field"><label>Tanggal</label><input type="date" id="dataDate" value="${todayStr()}"></div>
        <div class="field"><label>Line (opsional)</label>
          <select id="dataLine"><option value="">Semua Line</option>${LINES.map(l=>`<option value="${l}">${l}</option>`).join('')}</select>
        </div>
      </div>
      <button class="btn ghost sm" id="dataFilterBtn">Terapkan Filter</button>
      <button class="btn ghost sm" id="dataExportBtn">Export Excel</button>

      <h3 style="margin-top:20px;">Qty per Slot (kumulatif)</h3>
      <div class="tbl-wrap">
        <table><thead><tr><th>Line</th><th>Tanggal</th><th>Slot</th><th>Qty Kumulatif</th><th>Produksi Slot</th></tr></thead>
        <tbody id="dataQtyBody"></tbody></table>
      </div>

      <h3 style="margin-top:20px;">Absensi</h3>
      <div class="tbl-wrap">
        <table><thead><tr><th>Line</th><th>Tanggal</th><th>Hadir</th><th>Tidak Hadir</th></tr></thead>
        <tbody id="dataAttBody"></tbody></table>
      </div>
    </div>
  `;

  let lastQty = [], lastAtt = [];

  async function load(){
    const date = document.getElementById('dataDate').value;
    const line = document.getElementById('dataLine').value;
    let qPath = '/qty-logs?date=' + date;
    let aPath = '/attendance?date=' + date;
    if(line){ qPath += '&line='+encodeURIComponent(line); aPath += '&line='+encodeURIComponent(line); }

    document.getElementById('dataQtyBody').innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--muted);">Memuat...</td></tr>';
    document.getElementById('dataAttBody').innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--muted);">Memuat...</td></tr>';

    try{
      const [qty, att] = await Promise.all([apiGet(qPath), apiGet(aPath)]);
      lastQty = qty; lastAtt = att;
      if(qty.length){
        const byLine = {};
        qty.forEach(q=>{ (byLine[q.line]=byLine[q.line]||[]).push(q); });
        const rowsHtml = [];
        Object.keys(byLine).sort().forEach(ln=>{
          const sorted = byLine[ln].slice().sort((a,b)=>SLOTS.indexOf(a.slot)-SLOTS.indexOf(b.slot));
          let prev = 0;
          sorted.forEach(q=>{
            const cum = Number(q.qty)||0;
            const inc = cum - prev;
            prev = cum;
            rowsHtml.push(`<tr><td>${q.line}</td><td>${fmtDate(q.date)}</td><td>${q.slot}</td><td class="num">${fmtNum(cum)}</td><td class="num">${fmtNum(inc)}</td></tr>`);
          });
        });
        document.getElementById('dataQtyBody').innerHTML = rowsHtml.join('');
      } else {
        document.getElementById('dataQtyBody').innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--muted);">Tidak ada data.</td></tr>';
      }
      document.getElementById('dataAttBody').innerHTML = att.length
        ? att.sort((a,b)=>a.line.localeCompare(b.line))
             .map(a=>`<tr><td>${a.line}</td><td>${fmtDate(a.date)}</td><td class="num">${fmtNum(a.present_count)}</td><td class="num">${fmtNum(a.absent_count)}</td></tr>`).join('')
        : '<tr><td colspan="4" style="text-align:center;color:var(--muted);">Tidak ada data.</td></tr>';
    }catch(err){
      showToast('Gagal memuat data: '+err.message);
    }
  }

  document.getElementById('dataFilterBtn').addEventListener('click', load);
  document.getElementById('dataExportBtn').addEventListener('click', ()=>{
    if(!lastQty.length && !lastAtt.length){ showToast('Tidak ada data untuk diexport.'); return; }
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(lastQty), 'Qty per Slot');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(lastAtt), 'Absensi');
    XLSX.writeFile(wb, 'Data_Produksi_' + document.getElementById('dataDate').value + '.xlsx');
    showToast('File berhasil diexport.');
  });

  load();
}

// ---------- Kelola User ----------
async function renderIeUsers(){
  const root = document.getElementById('ie-users');
  root.innerHTML = `
    <div class="panel" style="max-width:480px;">
      <h3>Tambah User Baru</h3>
      <form id="adminCreateForm">
        <div class="field"><label>Nama Lengkap</label><input type="text" id="admFullName" required></div>
        <div class="field"><label>Email</label><input type="email" id="admEmail" required></div>
        <div class="field"><label>Password Awal</label><input type="text" id="admPassword" required minlength="6" placeholder="min. 6 karakter"></div>
        <div class="field"><label>Role</label>
          <select id="admRole">
            <option value="supervisor">Supervisor Produksi</option>
            <option value="ie">IE (superadmin)</option>
            <option value="tamu">Tamu (lihat saja)</option>
          </select>
        </div>
        <div class="field" id="admLineField"><label>Line (khusus Supervisor)</label>
          <select id="admLine">${LINES.map(l=>`<option value="${l}">${l}</option>`).join('')}</select>
        </div>
        <p id="adminCreateError" style="color:var(--red);font-size:12.5px;min-height:1em;"></p>
        <button type="submit" class="btn primary">Buat User</button>
      </form>
    </div>
    <div class="panel">
      <h3>Daftar User</h3>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Nama</th><th>Email</th><th>Role</th><th>Line</th><th>Dibuat</th><th>Aksi</th></tr></thead>
          <tbody id="adminUserBody"></tbody>
        </table>
      </div>
    </div>
  `;

  const roleSel = document.getElementById('admRole');
  const lineField = document.getElementById('admLineField');
  function toggleLineField(){ lineField.style.display = roleSel.value==='supervisor' ? '' : 'none'; }
  roleSel.addEventListener('change', toggleLineField);
  toggleLineField();

  document.getElementById('adminCreateForm').addEventListener('submit', async (ev)=>{
    ev.preventDefault();
    const errEl = document.getElementById('adminCreateError');
    errEl.textContent = '';
    const payload = {
      fullName: document.getElementById('admFullName').value.trim(),
      email: document.getElementById('admEmail').value.trim(),
      password: document.getElementById('admPassword').value,
      role: roleSel.value,
      line: roleSel.value==='supervisor' ? document.getElementById('admLine').value : null,
    };
    try{
      await apiPost('/admin/users', payload);
      showToast('User '+payload.email+' berhasil dibuat.');
      document.getElementById('adminCreateForm').reset();
      toggleLineField();
      loadUsers();
    }catch(err){ errEl.textContent = 'Gagal: '+err.message; }
  });

  async function loadUsers(){
    const body = document.getElementById('adminUserBody');
    body.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--muted);">Memuat...</td></tr>';
    try{
      const users = await apiGet('/admin/users');
      if(!users.length){ body.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--muted);">Belum ada user.</td></tr>'; return; }
      body.innerHTML = users.map(u=>{
        const created = u.created_at ? new Date(u.created_at).toLocaleDateString('id-ID') : '-';
        const isMe = u.id === currentUser.id;
        return `
        <tr>
          <td>${u.full_name||'-'}</td>
          <td>${u.email}</td>
          <td>
            <select data-id="${u.id}" class="admRoleSelect" ${isMe?'disabled':''}>
              <option value="supervisor" ${u.role==='supervisor'?'selected':''}>Supervisor</option>
              <option value="ie" ${u.role==='ie'?'selected':''}>IE</option>
              <option value="tamu" ${u.role==='tamu'?'selected':''}>Tamu</option>
            </select>
          </td>
          <td>
            <select data-id="${u.id}" class="admLineSelect" ${u.role!=='supervisor'?'disabled':''}>
              <option value="">-</option>
              ${LINES.map(l=>`<option value="${l}" ${u.line===l?'selected':''}>${l}</option>`).join('')}
            </select>
          </td>
          <td>${created}</td>
          <td>${isMe?'-':`<button class="btn danger sm" onclick="adminDeleteUser('${u.id}')">Hapus</button>`}</td>
        </tr>`;
      }).join('');

      document.querySelectorAll('.admRoleSelect').forEach(sel=>{
        sel.addEventListener('change', async ()=>{
          try{
            await apiPatch('/admin/users', { id: sel.dataset.id, role: sel.value });
            showToast('Role diperbarui.');
            loadUsers();
          }catch(err){ showToast('Gagal: '+err.message); loadUsers(); }
        });
      });
      document.querySelectorAll('.admLineSelect').forEach(sel=>{
        sel.addEventListener('change', async ()=>{
          try{
            await apiPatch('/admin/users', { id: sel.dataset.id, line: sel.value || null });
            showToast('Line diperbarui.');
          }catch(err){ showToast('Gagal: '+err.message); loadUsers(); }
        });
      });
    }catch(err){
      body.innerHTML = '<tr><td colspan="6" style="color:var(--red);">Gagal memuat: '+err.message+'</td></tr>';
    }
  }

  window.adminDeleteUser = async function(id){
    if(!confirm('Hapus user ini secara permanen?')) return;
    try{
      await apiDelete('/admin/users?id='+encodeURIComponent(id));
      showToast('User dihapus.');
      loadUsers();
    }catch(err){ showToast('Gagal: '+err.message); }
  };

  loadUsers();
}
